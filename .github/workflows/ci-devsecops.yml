name: CI DevSecOps - Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  build:
    name: Build, Tests et SonarQube
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build et tests Maven
        run: ./mvnw -B verify

      - name: Analyse SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.tokensonar }}
        run: |
          ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=backend \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=${SONAR_TOKEN}

  secrets-scan:
    name: Detection de secrets (Gitleaks)
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout du code (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependencies-scan:
    name: Scan des dependances (Trivy)
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Scan Trivy des dependances
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table
